<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-List</title>

    <script src="script.js" defer></script>

    <style>
        body {
            margin: 0;
            background-color: #252422;
            color: #eb5e28;
            display: flex;
            justify-content: center;
            flex-direction: column;
            align-items: center;
            height: 100vh;
        }

        .addButton, .deleteButton {
            margin: 20px;
            padding: 5px 14px;
            background-color: #eb5e28;
            color: #fffcf2;
            border: none;
            border-radius: 5px;
            font-family: 'Courier New', Courier, monospace;
        }

        .addButton:hover, .deleteButton:hover {
            scale: 1.1;
            background-color: #df7341;
            transition: 0.2s ease;
        }

        .ideaInput {
            font-family: 'Courier New', Courier, monospace;
        }

        .ideaList li {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

    </style>
</head>
<body>
    <h2>Project Ideas</h2>

    <input type="text" class="ideaInput" placeholder="Type an idea...">
    <div>
        <button class="addButton">Add Idea</button>
    </div>
    

    <ul class="ideaList">
    </ul>

</body>
</html>
